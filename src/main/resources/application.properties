app.crypto.secret-key=kzFLyvRXMIzOi4uhfsAstIZ6+SESihUOhrhc10+dRhg=

############################################################
# Oracle Database
############################################################

spring.datasource.url=jdbc:oracle:thin:@10.153.181.6:1525:stagedb
spring.datasource.username=GST_REGISTRATION
spring.datasource.password=stage123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

############################################################
# Hikari Connection Pool
############################################################

spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.pool-name=GST-HikariPool
spring.datasource.hikari.auto-commit=false

spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

############################################################
# SpringDoc
############################################################

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.tryItOutEnabled=true

springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json

############################################################
# Actuator
############################################################

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoints.access.default=read-only

############################################################
# Logging
############################################################
logging.config=classpath:log4j2.properties
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

############################################################
# Compression
############################################################

server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain

############################################################
# Graceful Shutdown
############################################################

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

############################################################
# Jackson
############################################################

spring.jackson.default-property-inclusion=non-null
spring.jackson.serialization.write-dates-as-timestamps=false

############################################################
# Servlet
############################################################

server.servlet.session.timeout=30m

############################################################
# Disable Whitelabel Error Page
############################################################

server.error.whitelabel.enabled=false


